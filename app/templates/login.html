{% extends "base.html" %}

{% block title %}
Login – Ophthalmology OT Register{% endblock %}

{% block head %}
<style>
    /* Hide navbar on login page */
    nav.navbar {
        display: none;
    }
</style>
{% endblock %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="card shadow-sm" style="width: 360px;">
        <div class="card-body">
            <h5 class="text-center mb-4" style="color: blue; font-weight: bold;">
                SREEKANTAPURAM HOSPITAL
            </h5>
            <h5 class="text-center mb-4">
               Ophthalmology OT Register
            </h5>
             <h6 class="text-center mb-4">
              LOGIN
            </h6>


            {% if error %}
            <div class="alert alert-danger py-2">
                {{ error }}
            </div>
            {% endif %}

            <form method="post" action="/login">

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        required
                        autofocus
                    >
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        required
                    >
                </div>

                <button class="btn btn-primary w-100">
                    Login
                </button>

            </form>

        </div>
    </div>
</div>

{% endblock %}
